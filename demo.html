<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Subscriber Demo</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171b22;
      --border: #2a3240;
      --text: #d7deea;
      --muted: #94a3b8;
      --ok: #22c55e;
      --warn: #f59e0b;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .pill.ok { color: var(--ok); border-color: rgba(34,197,94,0.5); }
    button {
      background: #1f2937;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(120px,1fr)); gap: 8px; }
    .label { font-size: 12px; color: var(--muted); }
    .value { font-weight: 600; }
    pre {
      margin: 0;
      max-height: 380px;
      overflow: auto;
      background: #0b0f14;
      border: 1px solid #1d2530;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.4;
    }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <h2 style="margin:0;">WebSocket Subscriber Demo</h2>
      <a href="/">Sensor</a>
      <a href="/flash">Transmitter</a>
    </div>

    <div class="card row">
      <span id="conn" class="pill">disconnected</span>
      <span id="url" class="pill"></span>
      <label for="sub-mode" class="label">Mode</label>
      <select id="sub-mode" style="background:#1f2937;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 8px;">
        <option value="full" selected>full stream</option>
        <option value="pattern">pattern-only</option>
      </select>
      <button id="btn-connect">Connect</button>
      <button id="btn-disconnect">Disconnect</button>
    </div>

    <div class="card grid">
      <div><div class="label">Messages/sec</div><div id="mps" class="value">0.0</div></div>
      <div><div class="label">Sample rate (pkt)</div><div id="sample-rate" class="value">—</div></div>
      <div><div class="label">Pattern</div><div id="pattern" class="value">—</div></div>
      <div><div class="label">Pattern score</div><div id="pattern-score" class="value">—</div></div>
      <div><div class="label">Detected</div><div id="detected" class="value">—</div></div>
      <div><div class="label">Delta</div><div id="delta" class="value">—</div></div>
      <div><div class="label">Brightness / BG</div><div id="lum" class="value">—</div></div>
      <div><div class="label">Angles</div><div id="angles" class="value">—</div></div>
    </div>

    <div class="card">
      <div class="label" style="margin-bottom:8px;">Latest sensor_reading payload</div>
      <pre id="latest">(no message yet)</pre>
    </div>
  </div>

  <script type="module" src="/src/client/demo.ts"></script>
</body>
</html>
