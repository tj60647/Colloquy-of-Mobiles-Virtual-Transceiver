<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flash Transmitter</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #00e5ff;
      --on: #ffdd00;
      --off: #1a1a1a;
      --text: #e0e0e0;
      --muted: #666;
      --danger: #ff4444;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Torch indicator ─────────────────────────────── */
    #torch-indicator {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--off);
      border: 3px solid var(--border);
      transition: background 0.04s, box-shadow 0.04s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
    #torch-indicator.on {
      background: var(--on);
      box-shadow: 0 0 40px 10px rgba(255,221,0,0.6);
    }

    /* ── Word selector ───────────────────────────────── */
    .word-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 380px;
    }

    .word-btn {
      padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .word-btn span { display: block; font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .word-btn.selected {
      border-color: var(--accent);
      background: rgba(0,229,255,0.08);
    }

    /* ── Pattern visualiser ──────────────────────────── */
    #pattern-bar {
      display: flex;
      gap: 2px;
      max-width: 380px;
      width: 100%;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .seg {
      flex: 1;
      height: 20px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.04s;
      min-width: 0;
    }
    .seg.on    { background: var(--on); }
    .seg.active { outline: 2px solid var(--accent); outline-offset: 1px; }

    /* ── Controls ────────────────────────────────────── */
    #start-btn {
      width: 100%;
      max-width: 380px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--accent);
      color: #000;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    #start-btn:disabled { opacity: 0.4; cursor: default; }
    #start-btn.running  { background: var(--danger); color: #fff; }

    /* ── Status ──────────────────────────────────────── */
    #status {
      font-size: 0.88rem;
      color: var(--text);
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
      min-height: 2.5em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 100%;
      word-break: break-word;
    }
    #status.err { color: var(--danger); border-color: var(--danger); }

    /* ── Loop counter ────────────────────────────────── */
    #loop-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Hidden video (needed for torch API) ─────────── */
    #cam-preview {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: cover;
      display: none;
    }
    #cam-preview.visible { display: block; }

    .note {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <h1>Flash Transmitter</h1>

  <div id="torch-indicator">💡</div>

  <p id="status">Select a word and tap Start.</p>

  <div class="word-grid" id="word-grid"></div>

  <div id="pattern-bar"></div>

  <button id="start-btn">Start Flashing</button>

  <div id="loop-count"></div>

  <video id="cam-preview" autoplay muted playsinline></video>

  <p class="note">
    Uses the rear camera torch (flashlight).<br>
    Supported on Chrome/Android. iOS Safari does not support the torch API.
  </p>
  <p class="note"><a href="/">← Sensor</a></p>

  <script type="module" src="/src/client/flash.ts"></script>
</body>
</html>
