<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flash Transmitter</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #00e5ff;
      --on: #ffdd00;
      --off: #1a1a1a;
      --text: #e0e0e0;
      --muted: #666;
      --danger: #ff4444;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Torch indicator ─────────────────────────────── */
    #torch-indicator {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--off);
      border: 3px solid var(--border);
      transition: background 0.04s, box-shadow 0.04s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
        .indicator-row {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 14px;
          width: 100%;
          max-width: 380px;
        }

        #start-btn {
          width: 100px;
          height: 100px;
          border-radius: 50%;
          border: none;
          cursor: pointer;
          background: var(--accent);
          color: #000;
          font-size: 0.9rem;
          font-weight: 700;
          letter-spacing: 0.02em;
          transition: opacity 0.15s, transform 0.1s;
          text-align: center;
          line-height: 1.2;
          padding: 8px;
        }
        #start-btn:active { transform: scale(0.98); }
        #start-btn:disabled { opacity: 0.4; cursor: default; }
        #start-btn.running  { background: var(--danger); color: #fff; }

    #torch-indicator.on {
      background: var(--on);
      box-shadow: 0 0 40px 10px rgba(255,221,0,0.6);
    }

    /* ── Word selector ───────────────────────────────── */
    .word-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 380px;
    }

    .word-btn {
      padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .word-btn span { display: block; font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .word-btn.selected {
      border-color: var(--accent);
      background: rgba(0,229,255,0.08);
    }

    /* ── Pattern visualiser ──────────────────────────── */
    #pattern-bar {
      display: flex;
      gap: 2px;
      max-width: 380px;
      width: 100%;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .seg {
      flex: 1;
      height: 20px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.04s;
      min-width: 0;
    }
    .seg.on    { background: var(--on); }
    .seg.listening { background: #203040; }
    .seg.active { outline: 2px solid var(--accent); outline-offset: 1px; }
    .seg.listening.active { outline-color: #7dd3fc; }

    /* ── Controls ────────────────────────────────────── */
    /* ── Status ──────────────────────────────────────── */
    #status {
      font-size: 0.88rem;
      color: #fff;
      text-align: center;
      max-width: 380px;
      line-height: 1.5;
      min-height: 2.8em;
      background: #1e3a3a;
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      word-break: break-word;
    }
    #status.err { color: var(--danger); background: #3a1e1e; border-color: var(--danger); }

    /* ── Loop counter ────────────────────────────────── */
    #loop-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Hidden video (needed for torch API) ─────────── */
    #cam-preview {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: cover;
      display: none;
    }
    #cam-preview.visible { display: block; }

    .note {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }

    /* ── Mode switch ─────────────────────────────────── */
    .mode-switch {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      width: 100%;
      max-width: 380px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #000;
    }

    .invert-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      max-width: 380px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-size: 0.86rem;
      color: var(--text);
    }
    .settings-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      width: 100%;
      max-width: 380px;
    }
    .settings-row .invert-row {
      width: auto;
      max-width: none;
      flex: 1;
    }
    .invert-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .rate-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* ── Frequency selector ──────────────────────────── */
    #freq-section {
      width: 100%;
      max-width: 380px;
      flex-direction: column;
      gap: 8px;
    }
    .freq-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #freq-display {
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
    }
    #freq-slider {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .freq-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
    }

    /* ── Sound indicator ─────────────────────────────── */
    #torch-indicator.sound-on {
      background: var(--accent);
      box-shadow: 0 0 40px 10px rgba(0,229,255,0.5);
    }
  </style>
</head>
<body>
  <h1>Transmitter <span id="build-ver" style="font-size:0.6em;opacity:0.5;font-weight:400;letter-spacing:0">v6</span></h1>

  <div class="mode-switch">
    <button id="mode-flash" class="mode-btn active">💡 Flash</button>
    <button id="mode-sound" class="mode-btn">🔊 Sound</button>
  </div>

  <div class="settings-row">
    <label class="invert-row" for="invert-toggle">
      <span>Invert (ON ↔ OFF)</span>
      <input type="checkbox" id="invert-toggle">
    </label>

    <label class="invert-row" for="rate-toggle">
      <span>Rate</span>
      <select id="rate-toggle" class="rate-select">
        <option value="40" selected>40 Hz</option>
        <option value="20">20 Hz</option>
      </select>
    </label>
  </div>

  <div class="indicator-row">
    <div id="torch-indicator">💡</div>
    <button id="start-btn">Start Flashing</button>
  </div>

  <p id="status">Select a word and tap Start.</p>

  <div class="word-grid" id="word-grid"></div>

  <div id="freq-section" style="display:none">
    <div class="freq-header">
      <span>Frequency</span>
      <span id="freq-display">1760 Hz</span>
    </div>
    <input type="range" id="freq-slider" min="0" max="4" step="1" value="0">
    <div class="freq-ticks">
      <span>1760</span><span>1976</span><span>2093</span><span>2349</span><span>2637</span>
    </div>
  </div>

  <div id="pattern-bar"></div>

  <div id="loop-count"></div>

  <video id="cam-preview" autoplay muted playsinline></video>

  <p class="note">
    Flash mode uses the rear camera torch — Chrome/Android only.<br>
    Sound mode plays a sine wave through the speaker (all browsers).
  </p>
  <p class="note"><a href="/">← Sensor</a></p>

  <script type="module" src="/src/client/flash.ts"></script>
</body>
</html>
